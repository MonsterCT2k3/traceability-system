spring.application.name=identity-service
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/identity_db?serverTimezone=Asia/Ho_Chi_Minh&timezone=Asia/Ho_Chi_Minh
spring.datasource.username=admin
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT — dùng cùng giá trị với api-gateway (app.jwt.signer-key) khi chạy qua gateway
jwt.signerKey=${JWT_SIGNER_KEY:YourSuperSecretKeyForJWTThatIsLongEnoughToBeSecure}

# Springdoc / OpenAPI (Swagger UI: /swagger-ui.html, spec JSON: /v3/api-docs)
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method

# Actuator health cho kiểm tra service sống/chết (local & monitoring)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Upload ảnh avatar (multipart). Mặc định Spring ~1MB → ảnh từ điện thoại dễ vượt → MaxUploadSizeExceededException
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

