spring.application.name=identity-service
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/identity_db?serverTimezone=Asia/Ho_Chi_Minh&timezone=Asia/Ho_Chi_Minh
spring.datasource.username=admin
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# Tắt log SQL ở môi trường thường — bật lại khi cần debug bằng cách đổi thành true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Quan trọng: tắt open-in-view để tránh giữ DB connection suốt vòng đời HTTP request
# Mặc định Spring Boot bật = true gây lãng phí connection pool
spring.jpa.open-in-view=false


# JWT — dùng cùng giá trị với api-gateway (app.jwt.signer-key) khi chạy qua gateway
jwt.signerKey=${JWT_SIGNER_KEY:YourSuperSecretKeyForJWTThatIsLongEnoughToBeSecure}

# Springdoc / OpenAPI (Swagger UI: /swagger-ui.html, spec JSON: /v3/api-docs)
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method

# Actuator — chỉ expose health để tránh lộ thông tin nội bộ và tiết kiệm overhead
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# HikariCP Connection Pool — Identity Service tải nhẹ (chủ yếu login/register)
# Mặc định HikariCP dùng 10 connection — với service nhỏ như này 5 là đủ
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=IdentityHikariPool


# Upload ảnh avatar (multipart). Mặc định Spring ~1MB → ảnh từ điện thoại dễ vượt → MaxUploadSizeExceededException
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

