server:
  port: 8080

# JWT: phải cùng giá trị với identity-service jwt.signerKey (identity ký token; gateway không verify local).
app:
  jwt:
    signer-key: ${JWT_SIGNER_KEY:YourSuperSecretKeyForJWTThatIsLongEnoughToBeSecure}
  services:
    identity:
      introspect-url: ${IDENTITY_INTROSPECT_URL:http://localhost:8081/api/v1/auth/introspect}
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"

spring:
  application:
    name: api-gateway
  # Gateway buffer body khi proxy; mặc định nhỏ có thể lỗi khi upload ảnh lớn qua /identity/**
  codec:
    max-in-memory-size: 10MB
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
            loggerLevel: BASIC
    gateway:
      # Thay ??i mvc th�nh server.webmvc
      server:
        webmvc:
          routes:
            - id: identity-service
              uri: lb://identity-service
              predicates:
                - Path=/identity/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: default
                    fallbackPath: /fallback

            # Route m?i cho Product Service
            - id: traceability-core-service
              uri: lb://traceability-core-service
              predicates:
                - Path=/product/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: default
                    fallbackPath: /fallback

            - id: catalog-service
              uri: lb://catalog-service
              predicates:
                - Path=/catalog/**
              filters:
                - RewritePath=/catalog/(?<segment>.*), /${segment}
                - name: CircuitBreaker
                  args:
                    id: default
                    fallbackPath: /fallback

            - id: trade-logistics-service
              uri: lb://trade-logistics-service
              predicates:
                - Path=/trade/**
              filters:
                - RewritePath=/trade/(?<segment>.*), /${segment}
                - name: CircuitBreaker
                  args:
                    id: default
                    fallbackPath: /fallback

            - id: blockchain-service
              uri: lb://blockchain-service
              predicates:
                - Path=/blockchain/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    id: default
                    fallbackPath: /fallback

management:
  endpoints:
    web:
      exposure:
        # Chỉ expose health — gateway là điểm vào công khai, hạn chế thông tin expose
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      failureRateThreshold: 50
      waitDurationInOpenState: 10000
      permittedNumberOfCallsInHalfOpenState: 3
      registerHealthIndicator: true


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/




