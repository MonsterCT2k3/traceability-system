server:
  port: 8084 # Port riêng cho Product Service

# Base URL cho QR catalog sản phẩm (link web). QR unit truy xuất chỉ chứa UUID, không dùng cấu hình này.
app:
  trace:
    frontend-base-url: http://localhost:3000

# Cùng secret với identity-service (ký JWT). Biến môi trường JWT_SIGNER_KEY.
jwt:
  signerKey: ${JWT_SIGNER_KEY:YourSuperSecretKeyForJWTThatIsLongEnoughToBeSecure}

# Cùng biến môi trường Cloudinary như identity-service (một tài khoản cho dev)
cloudinary:
  cloud_name: diftonvou
  api_key: 489513278158246
  api_secret: jc2N5MPilV-1ZjRv3rjw9PX27fo

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method

spring:
  application:
    name: catalog-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # Base URL blockchain-service (KHÔNG thêm / ở cuối). Nối thêm path: /ownership-change, /transformed-batch, /...
  url:
    blockchain-service: http://localhost:8083/api/v1/blockchain
  datasource:
    url: jdbc:postgresql://localhost:5433/traceability_catalog?serverTimezone=Asia/Ho_Chi_Minh&timezone=Asia/Ho_Chi_Minh
    username: admin
    password: password123 # Thay bằng pass của bạn
    driver-class-name: org.postgresql.Driver
    # HikariCP — Product Service có nhiều entity/repo, tải cao hơn identity-service
    hikari:
      minimum-idle: 3
      maximum-pool-size: 8
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: ProductHikariPool
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
            loggerLevel: BASIC
  flyway:
    enabled: false
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: update
    # Tắt log SQL ở môi trường thường — bật lại khi cần debug
    show-sql: false
    # Quan trọng: tắt open-in-view tránh giữ DB connection suốt vòng đời HTTP request
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

management:
  endpoints:
    web:
      exposure:
        # Chỉ expose health — tránh lộ thông tin nội bộ
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      failureRateThreshold: 50
      waitDurationInOpenState: 10000
      permittedNumberOfCallsInHalfOpenState: 3
      registerHealthIndicator: true

spring.kafka:
  bootstrap-servers: localhost:9092
  consumer:
    group-id: product-group
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

