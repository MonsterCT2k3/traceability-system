server:
  port: 8082 # Port ri�ng cho Product Service

# Base URL cho QR catalog sản phẩm (link web). QR unit truy xuất chỉ chứa UUID, không dùng cấu hình này.
app:
  trace:
    frontend-base-url: http://localhost:3000

# Cùng secret với identity-service (ký JWT). Biến môi trường JWT_SIGNER_KEY.
jwt:
  signerKey: ${JWT_SIGNER_KEY:YourSuperSecretKeyForJWTThatIsLongEnoughToBeSecure}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method

spring:
  application:
    name: product-service
  # Base URL blockchain-service (KHÔNG thêm / ở cuối). Nối thêm path: /ownership-change, /transformed-batch, ...
  url:
    blockchain-service: http://localhost:8083/api/v1/blockchain
  datasource:
    url: jdbc:postgresql://localhost:5433/product_db?serverTimezone=Asia/Ho_Chi_Minh&timezone=Asia/Ho_Chi_Minh
    username: admin
    password: password123 # Thay b?ng pass c?a b?n
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
