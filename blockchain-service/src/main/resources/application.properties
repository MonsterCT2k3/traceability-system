# Cau hinh Server
server.port=8083
spring.application.name=blockchain-service

spring.datasource.url=${BLOCKCHAIN_DB_URL:jdbc:postgresql://localhost:5433/traceability_blockchain}
spring.datasource.username=${BLOCKCHAIN_DB_USERNAME:admin}
spring.datasource.password=${BLOCKCHAIN_DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Cau hinh Web3j (Ket noi Ganache)
# Thay 7545 bang cong ban thay tren Ganache
web3j.client-address=http://127.0.0.1:7545

# Cau hinh Vi (Nguoi se tra phi gas de ghi du lieu)
# Dan Private Key ban vua copy vao day
blockchain.wallet.private-key=0xf4a4bcbab54312d462c50ee3057ca471aa44e9736715e28cfad9801b3a9e16bb

# Dia chi Contract (Luc dau de trong, sau khi Deploy xong thi dien vao)
blockchain.contract.address=0xe5a4992c09845831f1e373099f931d53212b5a50

# Cau hinh Gas cho Ganache. Gas price khop voi eth_gasPrice hien tai (20 gwei).
# Moi operation dung mot tran rieng de khong mo rong rui ro den block gas limit.
blockchain.gas.price=20000000000
blockchain.gas.limit.deploy=750000
blockchain.gas.limit.record-batch=120000
blockchain.gas.limit.record-transformed-batch=300000
blockchain.gas.limit.ownership-change=100000

# Actuator — chỉ expose health để kiểm tra service còn sống
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=blockchain-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer


eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/



management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
